<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramadan Night Bus Tracker</title>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #0f3820 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
            color: #ffd700;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '☪';
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            top: -20px;
            right: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1em;
            color: #e8c547;
        }

        /* Main Content */
        .content {
            padding: 40px 20px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3em;
            color: #1a472a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #1a472a;
            font-weight: 600;
            font-size: 1em;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #1a472a;
            box-shadow: 0 0 0 3px rgba(26, 71, 42, 0.1);
        }

        /* Bus Stops */
        .stops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .stop-btn {
            padding: 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #333;
            text-align: center;
        }

        .stop-btn:hover {
            border-color: #ffd700;
            background: #fffaf0;
        }

        .stop-btn.active {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
            color: #ffd700;
            border-color: #1a472a;
            transform: scale(1.05);
        }

        /* Button */
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a472a;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #1a472a;
            color: #ffd700;
        }

        .btn-secondary:hover {
            background: #2d5a3d;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #d9534f;
            color: white;
        }

        .btn-danger:hover {
            background: #c9302c;
        }

        /* Message */
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Dashboard */
        .dashboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .dashboard-table thead {
            background: #1a472a;
            color: #ffd700;
        }

        .dashboard-table th, .dashboard-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .dashboard-table tr:hover {
            background: #f9f9f9;
        }

        .stop-count {
            font-size: 1.5em;
            font-weight: bold;
            color: #1a472a;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            overflow-x: auto;
        }

        .tab {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #1a472a;
            border-bottom-color: #ffd700;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Staff List */
        .staff-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .staff-info {
            flex: 1;
        }

        .staff-name {
            font-weight: 600;
            color: #1a472a;
        }

        .staff-stop {
            color: #666;
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stops-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .btn {
                width: 100%;
            }

            .dashboard-table {
                font-size: 0.9em;
            }

            .dashboard-table th, .dashboard-table td {
                padding: 10px;
            }
        }

        .tabs {
            flex-wrap: wrap;
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-wrapper">
   <!-- Header -->
   <div class="header">
    <h1>🌙 Ramadan Night Bus</h1>
    <p>Colombo → Kandy Journey</p>
   </div><!-- Main Content -->
   <div class="content">
    <!-- Tabs -->
    <div class="tabs">
     <button class="tab active" data-tab="booking">Book Your Stop</button> <button class="tab" data-tab="dashboard">Live Dashboard</button> <button class="tab" data-tab="admin">Admin</button>
    </div><!-- Tab 1: Booking -->
    <div id="booking" class="tab-content active">
     <div class="section">
      <div class="message" id="message"></div>
      <div class="form-group">
       <label>👤 Select Your Name</label> <select id="staffSelect"> <option value="">-- Choose your name --</option> <option value="ROOHUL HAQ">ROOHUL HAQ</option> <option value="AASHIK">AASHIK</option> <option value="FAZLUR RAHMAN">FAZLUR RAHMAN</option> <option value="ABDUR RAHMAN">ABDUR RAHMAN</option> <option value="AC MUNEER">AC MUNEER</option> <option value="FM UMAIR">FM UMAIR</option> <option value="SHADIK">SHADIK</option> <option value="LUKMAN">LUKMAN</option> <option value="SAMEER">SAMEER</option> <option value="SM UMAIR">SM UMAIR</option> <option value="KM UMAIR">KM UMAIR</option> <option value="MAHIR MOULAVI">MAHIR MOULAVI</option> <option value="RIZVI MOULAVI">RIZVI MOULAVI</option> <option value="ASHRAF">ASHRAF</option> <option value="AROOS">AROOS</option> <option value="F AJMAL">F AJMAL</option> <option value="S AJMAL">S AJMAL</option> <option value="HAMMAD">HAMMAD</option> <option value="SHIYAM">SHIYAM</option> <option value="I M AMEEN">I M AMEEN</option> <option value="ABDUL AZEEZ FAZLUL">ABDUL AZEEZ FAZLUL</option> <option value="IRFAN">IRFAN</option> <option value="AC MUSHARRAF">AC MUSHARRAF</option> <option value="AKRAM MULAAFAR">AKRAM MULAAFAR</option> <option value="K R AASHIK">K R AASHIK</option> <option value="SHAKIR">SHAKIR</option> <option value="ABDUL QAIYOOM">ABDUL QAIYOOM</option> <option value="SAKEER">SAKEER</option> <option value="ZAKARIYYA">ZAKARIYYA</option> <option value="ABDULLA MOVLAVI">ABDULLA MOVLAVI</option> <option value="HASAN">HASAN</option> <option value="UMAR">UMAR</option> <option value="SHIHAM">SHIHAM</option> <option value="ASHROOQ">ASHROOQ</option> <option value="OTHER">✏️ Other / Add my name</option> </select>
      </div>
      <div class="form-group" id="customNameGroup" style="display: none;">
       <label>📝 Enter Your Name</label> <input type="text" id="customName" placeholder="Type your name...">
      </div>
      <div class="form-group">
       <label>🚌 Select Your Bus Stop</label>
       <div class="stops-grid" id="stopsGrid"></div>
      </div><button class="btn btn-primary" id="confirmBtn" style="width: 100%; margin-top: 20px;"> ✓ Confirm My Stop </button>
     </div>
    </div><!-- Tab 2: Dashboard -->
    <div id="dashboard" class="tab-content">
     <div class="section">
      <h2 class="section-title">📊 Live Summary</h2>
      <table class="dashboard-table">
       <thead>
        <tr>
         <th>Bus Stop</th>
         <th>Staff Count</th>
        </tr>
       </thead>
       <tbody id="dashboardTable">
        <tr>
         <td colspan="2" style="text-align: center; color: #999;">No bookings yet</td>
        </tr>
       </tbody>
      </table><button class="btn btn-secondary" id="generatePdfBtn" style="margin-top: 20px; width: 100%;"> 📄 Download PDF Report </button>
     </div>
    </div><!-- Tab 3: Admin -->
    <div id="admin" class="tab-content">
     <div class="section">
      <h2 class="section-title">⚙️ Admin Panel</h2><!-- Manual Add Section -->
      <div style="background: #f0f8f5; padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 2px solid #1a472a;">
       <h3 style="margin-bottom: 15px; color: #1a472a;">➕ Manually Add Staff &amp; Stop</h3>
       <div class="form-group"><label>Staff Name</label> <input type="text" id="adminStaffName" placeholder="Enter staff name...">
       </div>
       <div class="form-group"><label>Bus Stop</label> <select id="adminStopSelect"> <option value="">-- Select a stop --</option> <option value="Dehiwala">Dehiwala</option> <option value="Mount Lavinia">Mount Lavinia</option> <option value="Moratuwa">Moratuwa</option> <option value="Panadura">Panadura</option> <option value="Kalutara">Kalutara</option> <option value="Aluthgama">Aluthgama</option> <option value="Bentota">Bentota</option> <option value="Ambalangoda">Ambalangoda</option> <option value="Galle">Galle</option> <option value="Matara">Matara</option> <option value="Tangalle">Tangalle</option> <option value="Hambantota">Hambantota</option> <option value="Wellawaya">Wellawaya</option> <option value="Badulla">Badulla</option> <option value="Mahiyanganaya">Mahiyanganaya</option> <option value="Galaha">Galaha</option> <option value="Gelioya">Gelioya</option> <option value="Kandy">Kandy</option> <option value="Deltota">Deltota</option> <option value="__ADD_NEW__">── Add New Stop ──</option> </select>
       </div>
       <div class="form-group" id="newStopGroup" style="display: none;"><label>📍 Enter New Stop Name</label> <input type="text" id="newStopName" placeholder="e.g., Nawalapitiya, Peradeniya...">
       </div><button class="btn btn-secondary" id="adminAddBtn" style="width: 100%;"> ✓ Add Booking </button>
      </div><!-- Manage Stops Section -->
      <div style="background: #f5f0f8; padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 2px solid #666;">
       <h3 style="margin-bottom: 15px; color: #333;">📍 Manage Bus Stops</h3>
       <div class="form-group"><label>Current Stops (one per line)</label> <textarea id="stopsTextarea" style="width: 100%; height: 200px; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-family: monospace; resize: vertical; font-size: 0.95em;"></textarea>
       </div>
       <p style="color: #666; font-size: 0.9em; margin-bottom: 15px;">💡 Edit the list above - add new stops, remove unwanted ones, or reorder them. One stop per line.</p><button class="btn btn-secondary" id="updateStopsBtn" style="width: 100%; margin-bottom: 10px;"> ✓ Save Stops </button> <button class="btn btn-danger" id="resetBtn" style="width: 100%;"> 🔄 Reset All Bookings </button>
      </div>
      <h3 style="margin-top: 30px; margin-bottom: 15px; color: #1a472a;">All Bookings</h3>
      <div id="adminList"></div>
     </div>
    </div>
   </div>
  </div>
  <script>
        const STOPS = [
            'Dehiwala',
            'Mount Lavinia',
            'Moratuwa',
            'Panadura',
            'Kalutara',
            'Aluthgama',
            'Bentota',
            'Ambalangoda',
            'Galle',
            'Matara',
            'Tangalle',
            'Hambantota',
            'Wellawaya',
            'Badulla',
            'Mahiyanganaya',
            'Galaha',
            'Gelioya',
            'Kandy',
            'Deltota'
        ];

        let customStops = [];  // Store custom stops

        let currentData = [];
        let selectedStop = null;

        // Initialize Data SDK
        const dataHandler = {
            onDataChanged(data) {
                currentData = data;
                renderDashboard();
                renderAdmin();
            }
        };

        async function initializeApp() {
            await window.dataSdk.init(dataHandler);
            renderStops();
            updateStopsTextarea();
        }

        // Render bus stops
        function renderStops() {
            const grid = document.getElementById('stopsGrid');
            grid.innerHTML = STOPS.map(stop => `
                <button class="stop-btn" data-stop="${stop}" onclick="selectStop('${stop}')">
                    ${stop}
                </button>
            `).join('');
        }

        // Select stop
        function selectStop(stop) {
            selectedStop = stop;
            document.querySelectorAll('.stop-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-stop="${stop}"]`).classList.add('active');
        }

        // Staff selection
        document.getElementById('staffSelect').addEventListener('change', (e) => {
            const customGroup = document.getElementById('customNameGroup');
            if (e.target.value === 'OTHER') {
                customGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
            }
        });

        // Confirm booking
        document.getElementById('confirmBtn').addEventListener('click', async () => {
            const staffSelect = document.getElementById('staffSelect');
            const customName = document.getElementById('customName').value;
            const staffName = staffSelect.value === 'OTHER' ? customName : staffSelect.value;

            if (!staffName) {
                showMessage('Please enter your name', 'error');
                return;
            }

            if (!selectedStop) {
                showMessage('Please select a bus stop', 'error');
                return;
            }

            // Check if staff already exists and delete old record
            const existing = currentData.find(item => item.staff_name === staffName);
            if (existing) {
                await window.dataSdk.delete(existing);
            }

            // Create new booking
            const result = await window.dataSdk.create({
                staff_name: staffName,
                bus_stop: selectedStop,
                timestamp: new Date().toISOString()
            });

            if (result.isOk) {
                showMessage(`✓ ${staffName} - ${selectedStop} confirmed!`, 'success');
                document.getElementById('staffSelect').value = '';
                document.getElementById('customName').value = '';
                selectedStop = null;
                document.querySelectorAll('.stop-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        });

        // Render dashboard
        function renderDashboard() {
            const summary = {};
            currentData.forEach(item => {
                if (!summary[item.bus_stop]) {
                    summary[item.bus_stop] = [];
                }
                summary[item.bus_stop].push(item.staff_name);
            });

            const tbody = document.getElementById('dashboardTable');
            if (Object.keys(summary).length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: #999;">No bookings yet</td></tr>';
                return;
            }

            tbody.innerHTML = STOPS
                .filter(stop => summary[stop])
                .map(stop => `
                    <tr>
                        <td>${stop}</td>
                        <td><span class="stop-count">${summary[stop].length}</span></td>
                    </tr>
                `).join('');
        }

        // Render admin
        function renderAdmin() {
            const adminList = document.getElementById('adminList');
            if (currentData.length === 0) {
                adminList.innerHTML = '<p style="color: #999; text-align: center;">No bookings</p>';
                return;
            }

            adminList.innerHTML = currentData.map(item => `
                <div class="staff-item">
                    <div class="staff-info">
                        <div class="staff-name">${item.staff_name}</div>
                        <div class="staff-stop">→ ${item.bus_stop}</div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteStaff('${item.__backendId}')" style="padding: 8px 15px; font-size: 0.9em;">Delete</button>
                </div>
            `).join('');
        }

        // Delete staff
        async function deleteStaff(id) {
            const item = currentData.find(d => d.__backendId === id);
            if (item && confirm(`Delete ${item.staff_name}?`)) {
                await window.dataSdk.delete(item);
            }
        }

        // Admin: Manually add booking
        document.getElementById('adminStopSelect').addEventListener('change', (e) => {
            const newStopGroup = document.getElementById('newStopGroup');
            if (e.target.value === '__ADD_NEW__') {
                newStopGroup.style.display = 'block';
            } else {
                newStopGroup.style.display = 'none';
            }
        });

        document.getElementById('adminAddBtn').addEventListener('click', async () => {
            const adminStaffName = document.getElementById('adminStaffName').value.trim();
            let adminStop = document.getElementById('adminStopSelect').value;

            if (!adminStaffName) {
                showMessage('Please enter staff name', 'error');
                return;
            }

            // Handle new stop creation
            if (adminStop === '__ADD_NEW__') {
                const newStopName = document.getElementById('newStopName').value.trim();
                if (!newStopName) {
                    showMessage('Please enter new stop name', 'error');
                    return;
                }
                
                // Add to STOPS array if not already there
                if (!STOPS.includes(newStopName) && !customStops.includes(newStopName)) {
                    customStops.push(newStopName);
                    STOPS.push(newStopName);
                    
                    // Update dropdown
                    const select = document.getElementById('adminStopSelect');
                    const newOption = document.createElement('option');
                    newOption.value = newStopName;
                    newOption.textContent = newStopName;
                    select.insertBefore(newOption, select.querySelector('option[value="__ADD_NEW__"]'));
                    
                    showMessage(`✓ New stop "${newStopName}" added!`, 'success');
                }
                
                adminStop = newStopName;
                document.getElementById('newStopName').value = '';
            }

            if (!adminStop) {
                showMessage('Please select a bus stop', 'error');
                return;
            }

            // Check if staff already exists and delete old record
            const existing = currentData.find(item => item.staff_name === adminStaffName);
            if (existing) {
                await window.dataSdk.delete(existing);
            }

            // Create new booking
            const result = await window.dataSdk.create({
                staff_name: adminStaffName,
                bus_stop: adminStop,
                timestamp: new Date().toISOString()
            });

            if (result.isOk) {
                showMessage(`✓ ${adminStaffName} added to ${adminStop}!`, 'success');
                document.getElementById('adminStaffName').value = '';
                document.getElementById('adminStopSelect').value = '';
                document.getElementById('newStopName').value = '';
                document.getElementById('newStopGroup').style.display = 'none';
            }
        });

        // Reset all
        document.getElementById('resetBtn').addEventListener('click', async () => {
            if (confirm('Reset all bookings? This cannot be undone.')) {
                for (const item of currentData) {
                    await window.dataSdk.delete(item);
                }
                showMessage('All bookings reset', 'success');
            }
        });

        // Update stops from textarea
        function updateStopsTextarea() {
            const textarea = document.getElementById('stopsTextarea');
            textarea.value = STOPS.join('\n');
        }

        document.getElementById('updateStopsBtn').addEventListener('click', () => {
            const textarea = document.getElementById('stopsTextarea');
            const newStops = textarea.value
                .split('\n')
                .map(s => s.trim())
                .filter(s => s.length > 0);

            if (newStops.length === 0) {
                showMessage('Please add at least one stop', 'error');
                return;
            }

            // Update STOPS array
            STOPS.length = 0;
            STOPS.push(...newStops);

            // Update dropdowns
            updateStopDropdowns();
            renderStops();
            renderDashboard();

            showMessage('✓ Bus stops updated successfully!', 'success');
        });

        function updateStopDropdowns() {
            // Update admin stop select
            const adminSelect = document.getElementById('adminStopSelect');
            const currentValue = adminSelect.value;
            
            adminSelect.innerHTML = '<option value="">-- Select a stop --</option>' +
                STOPS.map(stop => `<option value="${stop}">${stop}</option>`).join('') +
                '<option value="__ADD_NEW__">── Add New Stop ──</option>';
            
            adminSelect.value = currentValue;
        }

        // Generate PDF
        document.getElementById('generatePdfBtn').addEventListener('click', () => {
            const summary = {};
            currentData.forEach(item => {
                if (!summary[item.bus_stop]) {
                    summary[item.bus_stop] = [];
                }
                summary[item.bus_stop].push(item.staff_name);
            });

            const html = `
                <div style="font-family: Arial; padding: 20px;">
                    <h1 style="text-align: center; color: #1a472a;">Ramadan Night Staff Bus Report</h1>
                    <p style="text-align: center; color: #666;">Date: ${new Date().toLocaleDateString()}</p>
                    <hr>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="background: #1a472a; color: white;">
                                <th style="border: 1px solid #ddd; padding: 10px;">Bus Stop</th>
                                <th style="border: 1px solid #ddd; padding: 10px;">Count</th>
                                <th style="border: 1px solid #ddd; padding: 10px;">Staff Names</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${STOPS
                                .filter(stop => summary[stop])
                                .map(stop => `
                                    <tr>
                                        <td style="border: 1px solid #ddd; padding: 10px;">${stop}</td>
